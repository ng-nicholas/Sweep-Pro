name: Draft release from template

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v1.0.5
        required: true
        type: string
      release_title:
        description: Optional release title. Defaults to "Sweep-Pro for e-ink <tag>"
        required: false
        type: string
      target:
        description: Branch or commit to tag
        required: true
        default: main
        type: string
      prerelease:
        description: Mark as pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          TARGET: ${{ inputs.target }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          title="${RELEASE_TITLE:-Sweep-Pro for e-ink ${TAG_NAME}}"
          body_file="$(mktemp)"
          sed "s/vX\.Y\.Z/${TAG_NAME}/g" .github/release_template.md > "${body_file}"

          args=(
            release create "${TAG_NAME}"
            --draft
            --target "${TARGET}"
            --title "${title}"
            --notes-file "${body_file}"
          )

          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
