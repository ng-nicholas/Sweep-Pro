# Base left half. Display support is enabled by sweep_left_display_hw.

# Smooth scrolling affects the central HID endpoint. Keep it on the left half
# instead of the right trackpad peripheral, where ZMK disables it by design.
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# The left half processes split pointer events and sends HID reports to the host.
CONFIG_INPUT_THREAD_STACK_SIZE=4096
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=32
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=64
